     FILE: app/templates/errors/404.html
     ============================================ -->
{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header bg-warning text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>404 - Page Not Found</h3>
            </div>
            <div class="card-body p-5">
                <i class="fas fa-map-signs fa-5x text-warning mb-4"></i>
                <h4 class="mb-3">Oops! The page you're looking for doesn't exist.</h4>
                <p class="text-muted mb-4">The page may have been moved, deleted, or you might have typed the wrong address.</p>
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>Go to Homepage
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
