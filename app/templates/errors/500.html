     FILE: app/templates/errors/500.html
     ============================================ -->
{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0"><i class="fas fa-exclamation-circle me-2"></i>500 - Internal Server Error</h3>
            </div>
            <div class="card-body p-5">
                <i class="fas fa-tools fa-5x text-danger mb-4"></i>
                <h4 class="mb-3">Something went wrong on our end.</h4>
                <p class="text-muted mb-4">We're working to fix the issue. Please try again later or contact support.</p>
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-redo-alt me-2"></i>Try Again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
